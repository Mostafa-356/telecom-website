[build]
  command = "pnpm build"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "8"

[dev]
  command = "pnpm dev"
  port = 3000

# Static assets - serve with correct headers
[[redirects]]
  from = "/sw.js"
  to = "/sw.js"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/favicon.svg"
  to = "/favicon.svg"
  status = 200

[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200

