<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="48" fill="url(#grad1)"/>
  
  <!-- Smartphone outline -->
  <rect x="56" y="36" width="80" height="120" rx="8" fill="none" stroke="white" stroke-width="3"/>
  
  <!-- Screen -->
  <rect x="60" y="44" width="72" height="96" rx="4" fill="white" opacity="0.9"/>
  
  <!-- Signal bars (inside screen) -->
  <g fill="#0066ff" opacity="0.8">
    <rect x="66" y="72" width="4" height="8" rx="1"/>
    <rect x="73" y="66" width="4" height="14" rx="1"/>
    <rect x="80" y="60" width="4" height="20" rx="1"/>
    <rect x="87" y="54" width="4" height="26" rx="1"/>
  </g>
  
  <!-- Notch -->
  <rect x="76" y="46" width="40" height="6" rx="3" fill="#333"/>
</svg>
